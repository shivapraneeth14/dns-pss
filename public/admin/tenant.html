<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenant Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="index.html" class="back">&larr; Back to Tenants</a>
  <h1 id="tenant-name">Loading...</h1>

  <p id="error-msg" class="error" style="display:none"></p>
  <p id="success-msg" class="success" style="display:none"></p>

  <form id="add-domain">
    <input name="domain" placeholder="e.g. portal.abc.com" required>
    <button type="submit" class="btn btn-primary">Add Domain</button>
  </form>

  <table id="domain-table">
    <thead>
      <tr>
        <th>Domain</th>
        <th>Status</th>
        <th>DNS Records</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="4" class="empty">Loading...</td></tr>
    </tbody>
  </table>

  <p style="margin-top: 2rem; font-size: .8rem; color: #999;">
    Multi-Tenant POC — Custom Domain Resolution
  </p>

  <script src="tenant.js"></script>
</body>
</html>
